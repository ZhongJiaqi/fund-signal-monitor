# 每日 10:00 北京(02:00 UTC)在 GitHub-hosted runner 上跑 monitor.py,
# 取代本地 macOS launchd,彻底解耦电脑唤醒 — 推送不再受睡眠/带电脑出门影响。
#
# 当前阶段:仅手动触发(workflow_dispatch),默认 dry-run。
# 验证 OK 后:取消 schedule 注释,启用工作日 10:00 自动跑(默认走生产路径)。
#
# 凭证:仓库 Settings → Secrets and variables → Actions 配两个 secret
#   SERVERCHAN_SENDKEY  — 从本地 .env 复制
#   FUND_CONFIG_B64     — 本地 `base64 -i config.json | pbcopy` 后粘贴
#
# state.json 持久化:actions/cache,key 带 run_id 保证每次写新版,restore-keys 拿最近一次

name: Daily Monitor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - production
      force:
        description: '跳过 same-day 幂等(强制重跑;用于故障验证)'
        required: false
        default: false
        type: boolean
  # 主触发源:Cloudflare Workers cron(workers.dev 上的 fund-monitor-cron)
  # 工作日北京 10:00 通过 GitHub Dispatch API POST 触发 workflow_dispatch
  # 精度 ±10 秒。Worker 源码: cf-cron-trigger/
  #
  # 兜底触发源(2026-06-12 加):GitHub Actions 原生 schedule,异源双跳板
  # 背景:2026-06-12 CF Workers 平台 02:00-02:11 UTC 整段窗口 scheduled 漏跑,
  # 3 个 CF schedule 全部 miss,用户当天没收到推送。多点兜底无法救平台级故障。
  # 解法:多加一条 GitHub 原生 schedule,跟 CF 完全异源,任一活就有推送。
  # 时间错开 CF 主路径 → 11:15 北京(GH schedule 高负载常延迟 5-20 分钟,11:15 想要
  # 实际命中约 11:20-11:35,远晚于 CF 主路径 10:00)。
  # 防双发:monitor.py same-day 幂等(state.last_run.date()==today → fast-exit),
  # CF 跑成功则 GH schedule 触发时被吸收,见 core/runner.py 幂等检查。
  schedule:
    - cron: '15 3 * * 1-5'   # 北京 11:15 兜底

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore state.json from cache
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: state-json-${{ github.run_id }}
          restore-keys: |
            state-json-

      - name: Write secrets to files
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_DOC_ID: ${{ secrets.LARK_DOC_ID }}
          FUND_CONFIG_B64: ${{ secrets.FUND_CONFIG_B64 }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "::error::Secret FEISHU_WEBHOOK_URL 未配置 (2026-06-12 起从 ServerChan 切到飞书)"
            exit 1
          fi
          if [ -z "$LARK_APP_ID" ] || [ -z "$LARK_APP_SECRET" ] || [ -z "$LARK_DOC_ID" ]; then
            echo "::error::飞书云文档凭证未配置(LARK_APP_ID / LARK_APP_SECRET / LARK_DOC_ID)"
            exit 1
          fi
          if [ -z "$FUND_CONFIG_B64" ]; then
            echo "::error::Secret FUND_CONFIG_B64 未配置"
            exit 1
          fi
          # SERVERCHAN_SENDKEY 阶段 1 暂留(send_serverchan 函数仍在,但 runner.py 不再调用),
          # 阶段 2 飞书云文档稳定 2-3 天后整体清理
          printf 'FEISHU_WEBHOOK_URL=%s\n' "$FEISHU_WEBHOOK_URL" > .env
          printf 'LARK_DOC_ID=%s\n' "$LARK_DOC_ID" >> .env
          if [ -n "$SERVERCHAN_SENDKEY" ]; then
            printf 'SERVERCHAN_SENDKEY=%s\n' "$SERVERCHAN_SENDKEY" >> .env
          fi
          printf '%s' "$FUND_CONFIG_B64" | base64 -d > config.json
          if [ ! -s config.json ]; then
            echo "::error::config.json 解码为空,检查 FUND_CONFIG_B64 是否粘错"
            exit 1
          fi
          # 校验 JSON 合法
          python -c "import json; json.load(open('config.json'))"
          echo "Secrets ready (.env + config.json)"

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            # schedule 触发 = 生产 cron,默认真发
            MODE="production"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "==> Run mode: $MODE"

      - name: Show env (debug, no secrets)
        run: |
          echo "Date(BJ): $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Python: $(python --version)"
          echo "akshare: $(python -c 'import akshare; print(akshare.__version__)')"
          echo "Runner location hint: $(curl -s --max-time 3 https://ipinfo.io/country || echo unknown)"

      - name: Run monitor
        # 2026-06-12 起 ServerChan 整链路下线: 原 SERVERCHAN_PROXY_URL/TOKEN 已删
        # (sctapi 对 CF Workers 出口 silent-fail,worker /push 中转方案失效)。
        # 现走 .env 里 FEISHU_WEBHOOK_URL,monitor.py → 飞书自定义机器人 webhook → 飞书群。
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          if [ "${{ steps.mode.outputs.mode }}" = "dry-run" ]; then
            python monitor.py --dry-run $FORCE_FLAG
          else
            python monitor.py $FORCE_FLAG
          fi

      - name: Setup Node.js + install lark-cli (production only)
        # 2026-06-12 起:用飞书云文档承载完整表格(规避飞书消息流移动端长卡片
        # 强制折叠的限制),lark-cli docs +update 把 monitor.py 生成的 XML 写到
        # 固定文档 ID。dry-run 模式不写云文档(只本地输出 XML 预览)。
        if: steps.mode.outputs.mode == 'production' && success()
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update Lark doc (production only)
        if: steps.mode.outputs.mode == 'production' && success()
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_DOC_ID: ${{ secrets.LARK_DOC_ID }}
        run: |
          if [ ! -s latest_alert_combined.xml ]; then
            echo "::warning::latest_alert_combined.xml 缺失或为空,跳过云文档更新"
            exit 0
          fi
          npm install -g @larksuite/cli 2>&1 | tail -3
          # 非交互鉴权(bot 身份):config init --app-id + --app-secret-stdin
          printf '%s' "$LARK_APP_SECRET" | lark-cli config init \
            --app-id "$LARK_APP_ID" \
            --app-secret-stdin \
            --brand feishu \
            --new
          # overwrite 模式:整篇文档替换(每天覆盖前一天数据)
          lark-cli docs +update \
            --doc "$LARK_DOC_ID" \
            --command overwrite \
            --content "@./latest_alert_combined.xml" \
            --doc-format xml \
            --as bot

      - name: Save state.json to cache (production only)
        if: steps.mode.outputs.mode == 'production' && success()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: state-json-${{ github.run_id }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}
          path: |
            run.log
            latest_alert_*.md
            latest_alert_combined.xml
            latest_alert_errors.md
            state.json
          retention-days: 7
          if-no-files-found: ignore
